<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">
    <div class="max-w-md mx-auto bg-slate-900 rounded-3xl p-8 border border-slate-800 shadow-2xl">
        <h1 class="text-2xl font-black mb-6 italic tracking-tighter text-blue-400 uppercase">Update Gas Prices</h1>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Effective Date</label>
                <input type="date" id="date" class="w-full bg-slate-800 border-slate-700 rounded-xl p-3 mt-1 text-white">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">National Avg ($)</label>
                <input type="number" id="nat_price" step="0.01" placeholder="3.68" class="w-full bg-slate-800 border-slate-700 rounded-xl p-3 mt-1 text-white">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">MA Specific ($)</label>
                <input type="number" id="ma_price" step="0.01" placeholder="3.55" class="w-full bg-slate-800 border-slate-700 rounded-xl p-3 mt-1 text-white">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Admin Password</label>
                <input type="password" id="pw" class="w-full bg-slate-800 border-slate-700 rounded-xl p-3 mt-1 text-white">
            </div>
            <button onclick="submitUpdate()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl mt-4 transition-all uppercase tracking-widest active:scale-95">Push Updates</button>
        </div>
        <p id="msg" class="mt-4 text-center text-xs font-bold"></p>
    </div>

    <script>
        async function submitUpdate() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            const data = {
                date: document.getElementById('date').value,
                nat_price: document.getElementById('nat_price').value,
                ma_price: document.getElementById('ma_price').value,
                pw: document.getElementById('pw').value
            };

            btn.disabled = true;
            btn.innerText = "UPDATING...";

            const res = await fetch('/api/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                msg.className = "mt-4 text-center text-xs font-bold text-emerald-400";
                msg.innerText = "Dashboard Updated Successfully!";
            } else {
                msg.className = "mt-4 text-center text-xs font-bold text-rose-500";
                msg.innerText = "Error: Check password or price.";
            }
            btn.disabled = false;
            btn.innerText = "PUSH UPDATES";
        }
    </script>
</body>
</html>
