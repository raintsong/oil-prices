<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-200 p-4 font-sans transition-colors duration-300">

    <div class="max-w-lg mx-auto">
        <header class="py-6 border-b border-slate-200 dark:border-slate-800/50 mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter italic leading-none uppercase">Pulse</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <p id="timestamp" class="text-[10px] text-blue-600 dark:text-blue-500 font-bold uppercase tracking-widest">Ready</p>
                        <a href="/admin" class="text-slate-400 hover:text-blue-500 transition-colors" title="Admin Update">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </a>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
                    <svg id="theme-icon-dark" class="hidden dark:block w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="theme-icon-light" class="block dark:hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
            </div>
            <button onclick="refreshAll()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-black py-3 rounded-2xl shadow-lg uppercase tracking-widest transition-all active:scale-95">Refresh Prices</button>
        </header>

        <div id="dashboard" class="grid gap-4 pb-12"></div>
    </div>

    <script>
        const categories = ['brent', 'wti', 'natgas', 'gasoline', 'retail_gas_nat', 'retail_gas_ma', 'heating_oil', 'jetfuel', 'algonquin'];
        const labels = {
            brent: "Brent Crude", wti: "WTI Crude", natgas: "Henry Hub",
            gasoline: "RBOB Gasoline", algonquin: "Algonquin Gas",
            retail_gas_nat: "US Retail Gas (AAA)", retail_gas_ma: "MA Retail Gas (AAA)",
            heating_oil: "MA Heating Oil", jetfuel: "Jet Fuel Spot"
        };

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function fmt(val) {
            return val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function fetchCard(cat) {
            const card = document.getElementById(`card-${cat}`);
            try {
                const res = await fetch(`/api/price/${cat}`);
                if (!res.ok) throw new Error("No data");
                const item = await res.json();
                
                let peakHTML = item.peak_2026 ? `
                    <div class="mt-3 py-1.5 px-3 bg-amber-500/10 border border-amber-500/20 rounded-xl flex justify-between items-center">
                        <span class="text-[9px] font-black text-amber-600 dark:text-amber-500 uppercase tracking-tighter">2026 High (${item.peak_2026.date})</span>
                        <span class="text-[10px] font-bold text-amber-700 dark:text-amber-500">$${fmt(item.peak_2026.val)}</span>
                    </div>` : "";

                card.classList.remove('loading-shimmer');
                card.className = "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-5 shadow-sm transition-all";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <a href="${item.source_url}" target="_blank" class="flex items-center gap-1 group italic">
                                <h2 class="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-wider group-hover:underline">${labels[cat]}</h2>
                            </a>
                            <p class="text-[8px] text-slate-400 dark:text-slate-600 font-bold uppercase mt-0.5">${item.source_name}</p>
                            <p class="text-[9px] text-slate-400 dark:text-slate-500 font-bold uppercase mt-1">${item.as_of}</p>
                        </div>
                        <div class="text-3xl font-mono font-bold text-slate-900 dark:text-white tracking-tighter">$${fmt(item.current)}</div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        ${renderStat('1D', item.d1)}
                        ${renderStat('7D', item.d7)}
                        ${renderStat('30D', item.d30)}
                    </div>
                    ${peakHTML}
                `;
            } catch (e) { 
                card.classList.remove('loading-shimmer');
                card.innerHTML = `<div class="h-40 flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-900/50 rounded-3xl border border-slate-200 dark:border-slate-800">
                    <p class="text-[10px] font-black text-rose-500 uppercase">${labels[cat]}</p>
                    <p class="text-[9px] text-slate-400 uppercase font-bold mt-1 tracking-widest text-center">No Data Available</p>
                </div>`; 
            }
        }

        function renderStat(label, stat) {
            if (!stat) return `<div class="bg-slate-50 dark:bg-black/20 p-2 rounded-xl"></div>`;
            const isPos = stat.abs >= 0;
            const color = isPos ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400';
            const sign = isPos ? '+' : '';
            return `
                <div class="bg-slate-50 dark:bg-black/40 p-2 rounded-xl border border-slate-200 dark:border-slate-800/50 text-center">
                    <p class="text-[8px] text-slate-400 dark:text-slate-600 font-black uppercase mb-1">${label}</p>
                    <p class="${color} text-[11px] font-bold leading-none mb-1">${sign}$${fmt(Math.abs(stat.abs))}</p>
                    <p class="${color} text-[9px] font-medium opacity-60 leading-none">${sign}${stat.pct}%</p>
                </div>`;
        }

        function refreshAll() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.id = `card-${cat}`;
                div.className = "loading-shimmer h-40 rounded-3xl";
                container.appendChild(div);
                fetchCard(cat);
            });
        }

        refreshAll();
    </script>
</body>
</html>
