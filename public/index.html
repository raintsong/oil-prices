<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Pulse Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-sans selection:bg-blue-500/30">

    <div class="max-w-xl mx-auto pb-20">
        <header class="py-10 flex justify-between items-end border-b border-slate-800/50 mb-8">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter italic">ENERGY PULSE</h1>
                <p id="timestamp" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-2 text-blue-400">INITIALIZING FEED...</p>
            </div>
            <button onclick="refreshAll()" class="group flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-[11px] font-black px-5 py-2.5 rounded-full transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                REFRESH
            </button>
        </header>

        <div id="dashboard" class="grid gap-6">
            </div>

        <footer class="mt-12 text-center">
            <p class="text-[9px] text-slate-700 font-bold uppercase tracking-widest leading-loose">
                Proprietary Estimate Engine • Data: Yahoo Finance & EIA Gov<br>
                Real-time Retail gas uses RBOB Futures Correlation Model
            </p>
        </footer>
    </div>

    <script>
        const categories = ['brent', 'wti', 'natgas', 'gasoline', 'retail_gas', 'heating_oil'];
        const labels = {
            brent: "Brent Crude Oil",
            wti: "WTI Crude (US)",
            natgas: "Henry Hub Nat Gas",
            gasoline: "Gasoline Futures (RBOB)",
            retail_gas: "MA Retail Gas (Estimate)",
            heating_oil: "MA Heating Oil (Weekly)"
        };

        function initPlaceholders() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.id = `card-${cat}`;
                div.className = "loading-shimmer h-36 rounded-3xl border border-slate-800 shadow-inner";
                container.appendChild(div);
            });
        }

        async function fetchCard(cat) {
            const card = document.getElementById(`card-${cat}`);
            try {
                const res = await fetch(`/api/price/${cat}`);
                const item = await res.json();
                
                card.classList.remove('loading-shimmer');
                card.className = "bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl hover:border-slate-700 transition-all duration-300";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <div>
                            <h2 class="text-[11px] font-black text-blue-400 uppercase tracking-wider mb-1">${labels[cat]}</h2>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">${item.as_of}</p>
                        </div>
                        <span class="text-3xl font-mono font-bold text-white tracking-tighter">$${item.current}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        ${renderStat('1-Day', item.d1)}
                        ${renderStat('7-Day', item.d7)}
                        ${renderStat('30-Day', item.d30)}
                    </div>
                `;
            } catch (e) {
                card.innerHTML = `<div class="h-full flex items-center justify-center text-rose-500 text-[10px] font-bold uppercase">Feed Interrupted</div>`;
            }
        }

        function renderStat(label, stat) {
            if (!stat) return `<div class="bg-black/20 p-3 rounded-2xl border border-slate-800/50"></div>`;
            const color = stat.abs >= 0 ? 'text-emerald-400' : 'text-rose-500';
            const sign = stat.abs >= 0 ? '+' : '';
            return `
                <div class="bg-black/40 p-3 rounded-2xl border border-slate-800/50 shadow-inner">
                    <p class="text-[8px] text-slate-600 font-black uppercase mb-1 tracking-tighter">${label}</p>
                    <p class="${color} text-sm font-bold leading-none mb-1">${sign}${stat.abs}</p>
                    <p class="${color} text-[10px] font-medium opacity-60">${sign}${stat.pct}%</p>
                </div>`;
        }

        function refreshAll() {
            const now = new Date();
            document.getElementById('timestamp').innerText = "Last Sync: " + now.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            initPlaceholders();
            categories.forEach(cat => fetchCard(cat));
        }

        refreshAll();
    </script>
</body>
</html>
