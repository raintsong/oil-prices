<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy & Gas Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .price-card { transition: transform 0.2s; }
        .price-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-4">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-blue-400">Energy Dashboard</h1>
        <p class="text-slate-400 text-sm">Last Updated: Just Now</p>
    </header>

    <main class="max-w-md mx-auto space-y-6">

        <section>
            <h2 class="text-xl font-semibold mb-3 border-b border-slate-700 pb-1">Brent Crude Oil</h2>
            <div class="price-card bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-slate-400 text-sm">Opening Price</span>
                    <span class="text-4xl font-mono font-bold">$101.85</span>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs uppercase tracking-wider">
                    <div class="bg-slate-700/50 p-2 rounded-lg">
                        <p class="text-slate-400 mb-1">24h</p>
                        <p class="text-red-400 font-bold">-2.8%</p>
                    </div>
                    <div class="bg-slate-700/50 p-2 rounded-lg">
                        <p class="text-slate-400 mb-1">7d</p>
                        <p class="text-green-400 font-bold">+5.2%</p>
                    </div>
                    <div class="bg-slate-700/50 p-2 rounded-lg">
                        <p class="text-slate-400 mb-1">30d</p>
                        <p class="text-green-500 font-bold">+51.1%</p>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-3 border-b border-slate-700 pb-1">Gasoline (Regular)</h2>
            <div class="space-y-4">
                <div class="price-card bg-slate-800 p-5 rounded-2xl shadow-lg border-l-4 border-blue-500">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-xs text-blue-400 font-bold uppercase">United States</p>
                            <p class="text-2xl font-mono font-bold">$3.72<span class="text-sm text-slate-500">/gal</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 uppercase">vs Yesterday</p>
                            <p class="text-red-400 font-bold">+0.5%</p>
                        </div>
                    </div>
                </div>

                <div class="price-card bg-slate-800 p-5 rounded-2xl shadow-lg border-l-4 border-emerald-500">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-xs text-emerald-400 font-bold uppercase">Massachusetts</p>
                            <p class="text-2xl font-mono font-bold">$3.58<span class="text-sm text-slate-500">/gal</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 uppercase">vs Month Ago</p>
                            <p class="text-red-500 font-bold">+22.4%</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-12 text-center text-slate-600 text-[10px]">
        Data provided via EIA and Commodity APIs
    </footer>

</body>
</html>
