<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Pulse Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-sans">

    <div class="max-w-xl mx-auto">
        <header class="py-8 text-center">
            <h1 class="text-3xl font-black text-white tracking-tighter">ENERGY PULSE</h1>
            <div class="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full mt-2">
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Live Market Feed</p>
            </div>
        </header>

        <div id="dashboard" class="space-y-4">
            <div class="text-center py-20 text-slate-600 animate-pulse">Loading market data...</div>
        </div>
    </div>

    <script>
        const labels = {
            brent: "Brent Crude (Global)",
            wti: "WTI Oil (US)",
            natgas: "Natural Gas (Henry Hub)",
            gasoline: "Gasoline (RBOB)"
        };

        async function loadData() {
            try {
                const res = await fetch('/api/prices');
                const data = await res.json();
                const container = document.getElementById('dashboard');
                container.innerHTML = '';

                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-tight">${labels[key]}</h2>
                            <span class="text-2xl font-mono font-bold text-white">$${item.current}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${renderStat('1D', item.d1)}
                            ${renderStat('7D', item.d7)}
                            ${renderStat('30D', item.d30)}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Failed to load data", e);
            }
        }

        function renderStat(label, stat) {
            const isPos = stat.abs >= 0;
            const color = isPos ? 'text-emerald-400' : 'text-rose-500';
            const sign = isPos ? '+' : '';
            return `
                <div class="bg-black/20 p-2 rounded-lg border border-slate-800/50">
                    <p class="text-[9px] text-slate-600 font-bold uppercase mb-1">${label}</p>
                    <p class="${color} text-xs font-bold">${sign}${stat.abs}</p>
                    <p class="${color} text-[10px] opacity-80">${sign}${stat.pct}%</p>
                </div>
            `;
        }

        loadData();
    </script>
</body>
</html>
